# Streamlit theme — pins the light theme + Office palette so every widget
# (st.metric, st.caption, selectbox labels, dataframe header) inherits readable
# text colors regardless of the browser's prefers-color-scheme. Without this,
# Streamlit auto-detects dark mode and renders white text on the cream
# background CSS in app.py — invisible.
#
# Colors mirror the PALETTE dict at the top of app.py. Keep them in sync.

[theme]
base                     = "light"
primaryColor             = "#b07d62"  # copper — buttons, links, focus rings
backgroundColor          = "#f5f0eb"  # warm_grey — main canvas
secondaryBackgroundColor = "#ffffff"  # white — sidebar + dataframe panels
textColor                = "#1a1a2e"  # charcoal — all body text
font                     = "serif"

[server]
headless = true

[browser]
gatherUsageStats = false
